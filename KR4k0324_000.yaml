替你作主你一個商人如何能作得了主更何況父母大人均已故去生如萍草隨它去便罷那你就跟著我回北京我會好好待你屋外楚玉聽到此處心想武宗何時變得如此溫柔多情心中覺得好笑又見窗紙上兩個人影交合一處田安説上鈎子屋內武宗抱著女尼溫存著又替他輕輕地寬衣解帶那女尼欲去吹燈武宗不許把他脫光放在炕上拿著蠟燭欣賞著他的身體武宗給他摘了帽子露出一頭短短的青絲突然覺得他有些象馬三爺家中的伶官透出一種超凡脫俗的魅力勾引起武宗無限的好奇心夜繁星點點遠處傳來陳陳濤聲晚風襲來甚是涼爽次日江霧散盡紅日高挂又是一個好天氣武宗與女尼等人正在庵中竹林旁品茶嘻戲忽聽得庵門被人拍得山響老尼急急出去打開庵門七八個差人跳將進來近前便要鎖了武宗等人大膽官差怎敢到此地橫行武宗喝道那帶頭的捕快不由分説便把武宗鎖住楚玉剛要動手田安對他説不必動手去了官府看他能怎樣就由他們綁了推搡著向外走李次賢聽到聲響從屋內走出一見此狀吃了一驚只聽田安對他喊道快去鎮江府尹那裏問他為何如此行事你這小子尚且嘴硬老子是丹徒縣令的手下關那府尹甚事你們淫亂尼庵強霸人妻還想拿什麼府尹唬老子把那尼姑一塊綁了李次賢見門口被把住翻牆跳了出去兩個捕快要去追那小頭目説主犯已抓到算那小子命大不必理他咱們走原來那書生夜裏被老尼一陳嗆白哄了出去越想越恨自己白白花了幾百兩銀子剛剛要勾搭上那女尼卻被這一夥人給沖散了又見武宗進了女尼的房間心想那人也是垂涎女尼的姿色心中發恨回到家中便去縣衙告了一狀偽稱那女尼是他的未婚妻入庵中修煉被強人誘惑又上上下下使了銀子地方富戶本來與縣衙有些關係又使銀子縣令捕快見了銀子哪有不賣力的次日便乘馬隨書生直撲尼姑雇把武宗等人押入縣衙武宗進了縣衙已是午後又飢又纍又氣火冒三丈又聽得差人傳喝升堂皂役手持大棒分列兩側縣令一搖三晃走了出來一拍驚堂木令把犯人帶上來武宗等人被押了上來卻不肯跪縣令又一拍驚堂木叫道大膽罪犯見了本官為何不跪武宗看這縣令頭如冬瓜栽入雙肩淡眉鬥雞眼肉鼻頭唇翻齒呲黑白鬍子如雜草斜飛橫長覺得好笑喂你這鬥雞眼怎配當縣令我還是去了你的官省得你給我丟人現眼武宗這麼一説楚玉田安都笑了起來堂上的縣令從沒見到如此大膽的罪犯氣得七竅生煙那雙眼直盯過來卻越發顯得似是呆愣一般門外邊擠滿了看熱鬧的百姓見這幾個犯人如此大膽竟敢説縣官老爺是斜眼也都忍不住笑這縣令平日裏魚肉百姓橫行霸道百姓今日見有人當面罵他也都覺得解氣嘟大膽罪犯竟敢戲弄本官棍棒伺侯兩個皂役持木棒撲過來舉棍便打楚玉雖被鎖住雙手不能施展雙手迎住砸下向武宗的棍棒朝外一磕只聽哢喳一聲木棍斷成兩截另一個棍棒還沒砸下見了此狀舉著棒子生生的定在那裏你這龜孫子竟敢打爺爺快叫人給我松綁你你你是什麼人我不是説了嗎是你爺爺你祖宗武宗説到這裏門外的百姓一陳哄笑縣令氣急敗壞喝令皂役把老百姓驅逐出去帶罪之徒給我跪下你給我跪下還差不多真是有眼無珠給我打打一群皂役又撲上來楚玉和田安護住武宗四面棍如叢林雙方虎視耽耽僵持不下突聽得一聲傳報鎮江府尹到且令命衆人退到一邊急急下堂迎接鎮江府尹走入縣衙看也不看那縣令就命人給武宗等除下刑具他們是案犯縣令跟著府尹轉急急説道他們奪人妻子玷污庵院還污辱本官罪罪罪當處斬我看你才當斬你知道你抓的是何人嗎是當今皇上縣令一聽此話兩隻眼珠子齊集中路又驚又嚇半晌沒緩過一口氣來武宗走到堂上坐下説道是誰指使你去抓人的縣令撲嗵一聲跪下説道是是他四處尋找那書生卻不見了人影剛才那書生一見情況不妙早就溜了是是一書生狀告到此你倒是行動甚快得了多少賞銀哪一百兩就這麼點銀兩就把你買下了他説事成之後還有重謝縣令慌慌忙忙説道説完又覺得不對改口説他説如能為民申冤還有重謝我看你這個官當得也夠費力的這麼著不如讓你這位聽差來坐這把椅子武宗指著堂下的一個年青差人説那年青差人怎麼也沒料到今日會有如此好事落到自己頭上急忙跪下謝恩我餓壞了快弄些吃的來皇上受驚了鎮江府尹説不如去府上休息幾日先吃了飯再説武宗道那新上任的縣官急忙派人整治宴席招待武宗武宗用過飯跟隨鎮江府尹住進鎮江府不提再説武宗出巡之後慧能在宮中的舉動越發大膽起來德妃與和尚鬼混了一些時日不見懷孕倒動了情欲隔天便派女婢來喚和尚慧能也是個機靈的早看透了德妃的心思與他行事卻從不肯丟在裏面他心中明白他身為妃子一旦懷孕便不會再與自己來往再説弄出了孩子遮掩得過還好遮掩不過豈不是空惹麻煩德妃派人來喚和尚有時推辭不去吊他的胃口自己在宮中與玉秀申燕等人鬼混阿春本是個老處女那一日被和尚弄過之後那話兒上下開了口子好生苦惱三月有餘弄得人面皮黃瘦晝夜思睡卻被間壁的玉仙看出了蹊蹺拿著話套他便套出了實情我原以為那顛鸞倒鳳的光景是啥滋味沒想到如此痛楚那話兒開了口子站起時便自蹲倒用手按定兀自疼痛前些日子那和尚給了些藥這幾日才見好玉仙聽了此話心中好笑又問道那玉秀與申燕怎麼不見如你這般光景他們倒是快活你沒見他們那模樣狂浪的不行這也是命那和尚的物件我受不得玉仙聽他如此之説也動了情便與平日裏幾個相好的姐妹們説了正是一帶肉屏風個個顔如玉偏遇薄情郎日日守空房麗質欲如焚對此寧不哭暗地把香燒願結來生福嫁與少年郎一生心事足幾個人商量好了尋著申燕玉秀打鬧要挾申燕玉秀心中有鬼怕事情張揚出去哪能不應便捎話給慧能慧能見有如此好事喜形於色申燕不滿地説你個花和尚免不了喜新厭舊慧能摟著申燕説放心小親親小僧沒有別的能耐這份能耐卻不得了的狠以一當十一個也空不著皇上出巡又逢掖廷管事生病永巷中便更加自由那管理宮中灑掃的張福早就看出這和尚不是個正派角色跟了幾日見他與德妃和宮女鬼混心中暗自歡喜張福入宮後斷了欲念貪上了酒肉如今又好上了觀淫夜夜都有好戲看隨他去鬧鬧個天翻地復才好一天夜晚申燕和玉秀帶著玉仙等人來到慧能做佛事的屋中和尚正與他們調笑鬼混小徒進來喚他慧能笑著對衆人説你們稍等片刻我去去就來慧能見德妃派人來喚急於打發了他就想起了那日偷的淫藥走進室內翻出那個小包帶在身上去會德妃床第之間施了那藥果然靈驗弄得德妃嬌喚聲聲和尚與他玩了一個時辰就欲起身德妃拽住不放慧能想那邊還有七八個人等他心中著急又施了一回藥又急急喝了幾口酒熱酒下肚便已難忍德妃哪里經得住他如此衝撞不一會便昏死過去和尚起身套上衣服急急趕了回去這藥粉本是錢寧的錢寧知道此藥厲害從不敢多用每回只用一次用過兩次次日會覺得頭暈眼花氣力不支用過三四次那物便奇癢難熬漲的如鐵棒一般只不見軟有致命的危險慧能哪里知道此中厲害只覺得用藥之後無比受用眼看著八個女人被他弄得丟盔卸甲還是不能罷手申燕已被他弄了一個更次只覺得腹下火燒火燎般的疼痛哀哀告饒和尚覺得今日比往日不同此刻卻遷延的如此長久弄得他如瘋癲一般紅了眼眼看著申燕又不支一眼瞅見了徒兒又把他拽了過去説起了悄悄話兒徙兒被他弄得疼痛拼命掙扎和尚死抱住不放窮追猛打眼看著已經四更天了只聽那和尚狂吼一聲癱倒在地玉秀等人聽了那一聲狂吼渾身無力地爬起來過去看時見和尚血淋淋的東西那徒兒也是血淋淋的衆人個個失色又見天色快明急急穿上了衣服把衣扣掩好只扣了外面的扣子直跌直晃的奔出來往回趕張福在窗外蹲了一宿見他們一個個篷頭垢面如鬼魂般地出來咳嗽一聲嚇得這些女人尖叫著又跑回去過了一會兒又見有人探出頭來四顧快走吧再不走就晚了那和尚像是死了管他呢別人看了還道是與徒兒鬼混弄死的該不著咱們什麼事剛才有人咳嗽你那是嚇壞了聽差了音一行人悄聲唧唧喳喳地議論了一會互相攙扶著貼著牆角溜進了永巷張福站起身來伸了個懶腰打著哈欠直了張旺自從皇上命他侍侯慧能求子以來甚是殷勤每天都早早的來張羅打掃購買物品等事那天早晨進了佛殿不見一個人影便進了後面寢室一邊走一邊嘟噥和尚也有睡懶覺的進了內屋一見和尚和徒弟光著身子躺在地上那徒弟尚在扭動摸摸和尚渾身冰涼已沒了氣息又見一女子渾身赤裸雙腿之間還在向外流著血近前細瞧卻是永巷中的姑娘張旺心中叫苦不疊這和尚原本是個好色之徒我怎麼就忘了還引他入宮求子皇上若知道此事可如何得了張旺上牙嗑下牙心頭發顫慌裏慌張走出去外面還有兩個小太監等侯吩咐卻見張旺失魂地走出來如癡了一般張旺回到住處左思右想沒有出路一根帶子拴到梁上上吊死了張永得知此事命人不許走漏消息把張旺和和尚等人悄悄埋了慧能宣淫而死之時武宗已乘船到了揚州此番打出了皇帝的招牌隨從如雲排場不凡中是大龍舟兩邊各有護衛船隻雜有專載樂工女伶的花船武宗日日與歌姬舞妾在河上取樂這樂倒也樂只是少點情趣武宗對楚玉説我説皇上老爺這有多排場也免得被那縣令逮去過堂省了我們多少心聽説這河中有鯉魚下水捕魚玩好不好隨你怎麼玩這回再也不會被賊人抓了你去那管事的聽説皇帝要下河捕魚正不知如何是好卻見武宗已命船上士兵把一瓜皮艇子放入水中自己與田安爬了進去楚玉站在船上只是笑田安兩手挽著兩枝槳望前劃去武宗把絲網拋進江中叫田安快劃離船隊遠一些瓜皮艇子太小龍船不能靠前只在向後跟著兩邊的花船吹打著奏樂瓜皮艇子行在河心突然滴溜溜的似車輪一般轉個不住田安心道不好遇上渦流了兩臂用力卻不出來瓜艇越轉越快把個武宗暈得趴在艇底直不起腰來絲網又纏住了雙槳田安拼命拽也拽不開只好把槳丟開楚玉一看不好又叫人放下一隻艇子綽起一根竹篙在龍船上一點縱身跳入艇子中又將竹篙在龍船上一點艇子便如箭離弦到了河心將竹篙朝武宗的艇子用力向外一拔那艇就沖出了渦流楚玉劃過去把篙的一頭遞給田安扯住劃著小艇把他們拖回來上了龍船武宗還覺得頭暈走阿捉魚去翻了船洗個浴那才痛快楚玉逗武宗道這水看似柔弱不想確如此厲害就象你武宗用手指頭戳楚玉的肩窩晚膳武宗與田安合夥行點將令一時釧韻鏗鏘叉光曆亂楚玉連連敗北玉山漸傾武宗説看看你還嘴硬恩將仇報楚玉手指武宗武宗報以微笑膳後武宗在船板上散步見船弦兩邊用極粗繩索懸挂著一丈五尺圍圓的幾箱煙火田安指點著説這是廣東煙火非常好看煙火有什麼希奇楚玉説説好看就好看到了晚上你再看正説著話半空中吹來一陳昆曲倚著笛韻悠悠揚揚輕風到耳武宗説這南音美是美就是哩哩啦啦聽不懂唱得啥就見對面畫船上一隊樂工吹簫敲板兩個女子尖著嗓子唱興頭正濃當晚龍船頂樓擺下宴席有女伶相陪觀煙火畫船中奏著樂一船工點著藥線藥線燃進窟窿箱底脫然委地先是兩串百子響鞭劈劈拍拍震得耳聾隨後一陳金星亂落如雨又有明光從箱內躥出如月洞一般照得五步之內針芥畢現忽有流星閃爍盤旋護著一條走龍翔舞而下那龍口中吹出數十個炮如大珠小珠紛紛落入河中龍身鱗甲間冒出黃煙氤氳馥鬱良久不散看的人齊聲喝采那龍又顛首掀尾翻了幾十個筋斗放出花子滿身環繞跋扈飛揚有翻江攪海之勢花子一住龍也居中不動自首至尾徹裏透明一鱗一爪歷歷可數龍頭尺木披下一幅手卷上書吾皇萬歲萬萬歲武宗見了大喜命人再放幾筒煙火有牛郎織女過鵲橋天女散花丹鳳朝陽等花色武宗擊掌歎絶這一夜江火江邊百姓大開眼界人山人海前來圍觀似過年般熱鬧龍船沿河北上過了月餘方才進京張永帶人羅列儀仗把皇帝接進宮去那護送皇上的官員一一受到封賞打發回去不提
