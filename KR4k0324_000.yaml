body:
  text: 武宗逸史第一部民國齊秦野人著目録第一章嬌佳麗偏能惑主癡君王病入膏盲第二章開經筵少主戲臣正朝綱群臣逐虎第三章誅大臣施殺手貪色欲罷內官第四章刺皇上殺手探索荒政事欲築豹房第五章封國師淫僧誘帝獻花燈火燒皇宮第六章圖大位王爺舉兵逞英雄武宗墜馬第七章選勇士豹房雲雨施計謀兩虎相爭第八章求子嗣禿驢姦妃擺獸陳猛虎傷人第九章太監娶親昏君祭祖第十章遊秦淮放蕩不羈逞淫術命歸黃泉第十一章誅姦賊千刀萬剮降猛虎新人得寵第十二章選美女皇帝出京使調包君臣爭麗第十三章銷魂夜傳軍情禦親征失信物第十四章豹房間姬爭寵閹臣惑亂宮闈第十五章張皇後假傳生子露經血陰謀揭破第十六章官宦爭權互殘殺君王風流罷忠臣第十七章天壇起事鬧春宮義軍血灑滿京城第十八章假扮新郎圓房護衛院落被綁第十九章幸美人縣令獻車奉仙丹道姑風流第二十章百官千里尋帝梁蔣計諫武宗第二十一章跪午門臣婢斃命塞外北遊遇女仙第二十二章寧王造反守仁棄功第二十三章天子落水荒唐夢終姦官弄險不得全尸第一章嬌佳麗偏能惑主癡君王病入膏肓明朝自太祖朱元璋開國至明武宗繼位金鑾殿上已換了十位皇帝然而自永樂皇帝以後的繼承者均缺乏強烈的個性和軍事政治才能他們越來越受朝內朋黨特別是太監的影響後者的權力與日俱增外表看來明王朝聲威不減當年因其簡練精悍的管理機構組織得相當有效所以儘管中央權力在削弱整體機構卻仍能照常運轉長期不受干擾話説明朝第九位皇帝孝宗身後只有一根獨苗朱厚照明代孝宗以前的三朝所立皇儲皆非嫡出而明武宗卻是孝宗嫡生的兒子説到這個嫡出的兒子也有一段煩心事明孝宗雖無大才人德卻也是個守成的皇帝他生活上比較檢點只娶了張皇後一人兩個人也算得上是恩愛夫妻廣選嬪妃充實後宮之事在孝宗一朝沒有實行過明武宗的母親張皇後一夜夢見白龍入腹就把此事告訴了孝宗孝宗大喜認為是有子的吉兆及至生下朱厚照孝宗見兒子生得粹質比冰玉神采煥發舉止非常很是寵愛兩歲就册立為皇太子可是偏偏有人散布謠言説皇太子並非張皇後所生而是周太后宮中的一個叫鄭金蓮的宮女所生被張皇後暗中抱去充為己生皇家豈容此等謠言傳播孝宗命刑部鞠治散布謠言者刑部遵旨行事抓了不少人其中有一人便是鄭金蓮的父親其他人均被處斬唯獨鄭金蓮的父親得免於是朝野之中竊議不息朱厚照生母究竟是誰孝宗也攪不清楚對張皇後産子孝宗也很疑惑初婚以及後來很長時間的寵幸皇后並沒有為他生下一瓜半棗懷孕之後便不許他再近身而與鄭宮女的事情卻使他終生難以忘懷從成年之後他一直是非禮勿視非禮勿聞宮中沒有嬪妃先帝留下的年老妃嬪全是與之隔絶的不見不欲其心不亂他所能見到的宮眷只有皇后一人那日周太后派鄭宮女給皇后這邊送來八匹綢緞婆媳二人商量著做幾身新衣迎春適逢皇后不在告辭回宮的鄭宮女在廳廊上遇見了孝宗孝宗見這女人有宮中婦女少有的紅潤胸部豐滿臀部寬大突然便如著了魔一般鄭宮女俯身請安孝宗伸手把他扶起來拉住了他肉乎乎的手凝目睇視鬼使神差把他帶到寢宮皇后這幾日正逢月事皇上已經幾天沒有近身如今懷中抱著一個豐腴無比的女人孝宗激動不已難以自製就做出事來了這女子比皇后另有一種滋味他豐滿有力不似皇后那般嬌弱他嘗到了偷的滋味他開始對女人感興趣難道只此一次他便懷了身孕孝宗百思不得其解為平息謠言不少人做了冤死鬼孝宗為了維護皇家的名譽用鮮血澆滅謠傳而在他的心中皇太子究竟是誰所生卻成了一個謎心中系著疙瘩想去問張皇後覺得不妥又欲問鄭金蓮更覺荒唐心中好不苦惱直到他身邊的兩個美人笑著逗他説陛下真是解糊塗扣兒越解越糊塗管他是張氏所生還是鄭氏所生不都是陛下的兒子孝宗坐在床邊撲哧一聲笑出聲來朕荒唐荒唐口中雖然如此之説心中對張皇後的不滿猜疑卻並沒有消除孝宗史稱中興之令主登基之後社會經濟有較大發展政治形勢也相對穩定一生只娶張皇後一人雖暗地裏也有偷雞摸狗的事情卻也算得上是生活上嚴有節制的可是到了三十多歲之後孝宗暗中也喜歡上了漂亮的女人如久蓄的河流一旦打開閘門便一發不可收拾孝宗的這種變化被太監張福看到眼裏暗中報告了主子寧王朱宸濠朱宸濠忍疼割愛把身邊的兩個美人雲兒和彩兒偷偷送給孝宗這雲兒和彩兒均年不過二十巧於詞令能歌善舞且頗具媚態或歌或舞或嬌啼翠眉不單花顔低忽然一笑千萬態見者十人八九迷孝宗一見此二人便不忍丟手日日與二美在寢宮中行樂孝宗正當中年精力旺盛此二女又經專門調教對男女之事早已熟識且各有異術弄得孝宗日醉夜迷張皇後對孝宗迷戀二美心中生妒卻也無計可施屢屢勸説孝宗只是不聽弄得夫妻反目張皇後眼不見心不煩心灰意懶自居中宮對皇上的事不聞不問孝宗也樂得自由縱情歡愈少些約束他對二美説朕活了半輩子方解神仙的快樂孝宗這一放縱便如脫韁的野馬再難收拾眼見得未老先衰還不肯罷手朱宸濠怎會捨得把如此佳麗拱手送給孝宗這其中自然有些道理那朱宸濠本是太祖第十七子朱權的玄孫承襲祖上的封號亦為寧王居於南昌明朝孝宗以前的三朝皇儲皆非嫡出也有宗室子孫繼承皇位的朱宸濠當然也有承繼大位的希望可偏偏孝宗半路上生了個兒子杜絶了這份希望朱宸濠豈能不恨恰值明宮中的內線宦官張福送出口信那孝宗身子虛弱卻露出貪愛女色的真相小太子也均屬好色之徒朱宸濠便動了心思把身邊的美人送給了皇上這兩個美人均是被開導過的朱宸濠為了謀篡皇位忍疼割愛又找來西域精通淫術的方士日夜與二美鬼混授以房中之術和淫藥孝宗皇帝見了雲兒彩兒礙于張皇後的面子不好收他們為妃就把他們留在身邊做女婢孝宗正當壯年整日與年青貌美的女子在一起哪有不出事的這兩個女子都是被調教出來的手段非同一般孝宗偷嘗了禁果之後那滋味使他心醉神迷弄得身子骨很快虛弱下來雲兒給他服了春藥又使他頓覺精神煥發日夜與二美在床笫之間嘻戲眼見得淘光了身子不知不覺之間病倒床榻難以支撑皇帝病倒太子入內侍疾太子年方十四豐神秀朗透著一股機靈他不愛讀書專好騎馬射箭偷香竊玉孝宗與張皇後對這個獨苗苗百般呵護大臣們見太子荒于學業便稟報皇上孝宗便數次親臨翰林春坊查其學業太子每次都很懂禮節率春坊官僚迎入送出顯得規規矩矩皇上有時考他一些問題也能草草應對混淆過去太子靠著自己的小聰明把孝宗哄騙得過全然不知他底下都幹些什麼孝宗為照顧兒子的起居生活特派太監劉瑾隨侍皇兒身邊劉瑾對太子的胡作非為不僅不報反而縱容他玩樂戲耍成了他的保護傘每次孝宗赴翰林春坊早有劉瑾安排的小太監來報消息一日太子在青坊把太監當馬騎令劉瑾在一邊把書章撒往空中自己騎馬揮舞樹枝當劍亂砍亂刺空中飄落的紙片正玩得高興皇上駕到太子慌亂之中來不及偽裝孝宗進了春坊見碎紙遍地筆硯歪躺太子尚騎在馬上旁有劉瑾隨侍不禁心中大怒吆喝來人痛打太子二十大板那望哨的小太監去解手回來時正見皇上發怒一看不好急趨中宮告知張皇後太子跪在地上求饒孝宗硬著心腸不理他劉瑾求情孝宗喝苴大膽奴才太子如此行徑你還替他辨解一併拿下痛打二十孝宗正發怒見張皇後鳳輦來到張皇後下輦請安太子一見母親來了撲入張皇後懷中哭泣告饒張皇後見兒子哭成了淚人心中疼痛對孝宗説念其初犯就饒他這一次吧你問他這是第一次嗎兒皇以後再也不敢胡鬧請父皇寬恕兒臣你是一國之儲君如此荒唐怎堪承繼大統皇兒年少來日方長慢慢調教不遲張皇後不滿地説孝宗見張皇後一味地護著太子也不好鬧得太僵命太子日交習作一篇以為懲罰起身回宮皇上走後張皇後又替兒子理妝抹淚勸他用心學習經史子集不要過分貪玩太子點頭應允事後太子把那望哨的小太監找來嚇得那小太監跪在地上告饒太子踢了他一腳道看在你叫來母后的份上此次饒了你如有下次定把你亂棍打死太子依然如舊皇上與皇后的勸説訓斥早已成了耳旁之風流過去再無蹤影太子雖不好學卻喜歡新鮮事什麼事都要問個明白他身邊的小太監都是些閹人他就纏著劉瑾問閹人是怎麼回事還要太監脫了褲子給他看有什麼好看的都是些廢人不似太子長大了還要娶三宮六院七十二妃劉瑾説那為什麼要把你們閹了呢太子問道後宮是皇后及嬪妃的住地顯了防止出醜的什麼事叫醜事男婦媾合這個我知道就是男女交配生孩子是嗎是了太子自小對性便有瞭解稍大之後便欲一試一次他去母后宮中玩耍與婢女搶吃的動作魯莽了一些以至觸及軟軟的一塊肌肉那婢女臉色頓時潮紅太子更有一種特異的感受自分府之後宮中已不多見女人身邊儘是些太監他便想到劉瑾告訴他男女媾合之事雖然只是淺淺一嘗但滋味無窮太子見母后不在旁邊大著膽上前摟抱著那婢女卻不知如何下手只是渾身亂摸那婢女欲就欲離太子只是不撒手直到劉瑾慌慌地跑過來低聲説皇后出來了他才撒手事後劉瑾嘲笑他是只不會打鳴的小公雞太子不但不惱又纏著劉瑾問那男女之事如何行法劉瑾就給他找來一本圖畫教他自己看太子聰明機靈雖不用功記憶卻好學過的東西過目不忘那些進進出出的講官均能一一叫上名字來多日不忘私下裏給他們都起了不少綽號有李歪嘴大夜壺小耗子等等表面上太子對他們甚是尊敬有人某天沒來太子必顧左右問道某先生今日安在心中卻暗叫其綽號甚是痛快講官退出太子張拱致敬做出揖送狀待講官走了太子轉身便跳上桌面呼其綽號扮其模樣維妙維肖孝宗身體越來越弱一病不起太子入內侍疾見父皇昏昏地睡在床上自己無事可做便在屋內走來走去象被鎖在籠中的猴兒一刻也安靜不下來及至看到了雲兒和彩兒他才靜靜地坐在床邊拿眼向他們瞟來瞟去雲兒彩兒是何等人物見太子豐神秀朗早生愛慕又見他一雙眼睛只是繞著他們轉就看透了他的心思雲兒飄飄地走到床前斜眼看了一下太子伸出嫩蔥似的秀手在皇帝額頭上探試又把如花似玉的一張臉貼上去似旁若無人太子坐在床前看著他的媚態心思萌動伸出腳去故意踩住他的裙邊雲兒朝他一笑並不羞惱太子頓時大起膽子彎下身來把手伸進他的裙子裏攥了一下那雙小腳太子摸了雲兒的腳雲兒臉上飛紅低眉垂首眼含秋波羞答答地把腳抽回去彩兒站在一旁竊笑不語太子起身走出寢宮站在門口頻頻以目示意雲兒佯裝不睬太子又走進來靠著雲兒從背後把頭從側面探向前去輕輕地咬住他的耳垂彩兒走上前來輕聲説道陛下病重太子如此嘻戲有失禮儀龍鳳之戲正是呈祥祈祥免災何為不禮太子側過頭去對彩兒説見他肌膚如凝脂暗透桃花色順口説了一句姐姐多照待些我與他少去一會兒罷了再來換你小小年紀豈有喏大本事彩兒挑逗説姐