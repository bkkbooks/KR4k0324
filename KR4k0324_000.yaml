鎮守太監帶領軍士捉拿進獻的白日裏經常入其中在高臺上觀看虎虎相鬥豹豹相鬥虎豹相鬥看得久了也覺無趣又下令廣召天下善搏虎豹者入豹房做勇士選進京的有上萬人武宗又從萬人中選出了一百名勇士住進豹房武宗逞勇用武對騎馬射箭很感興趣觀看武士鬥虎豹比那些筋斗雜耍更覺有趣正因為如此狡狠的武夫倍受寵幸那選來的勇士中有一名叫錢寧的此人較狡詐善騎射他高高的個子結實的身板眉毛粗黑眼睛大而細長閃著亮光鼻梁挺直只是略嫌短粗嘴唇較厚線條卻很清楚所有的五官配上一張長方臉顯出一副標準的男性形象他喜歡赤身搏虎他脫下上衣雄壯的身體上長滿常人少有的胸毛一塊塊肌肉清楚地顯露出來很象故事中的豪傑英雄他搏虎時肌肉便出現優美的變化這一切對楚玉來説具有無限的魅力和吸引力他自小及大見過的男人很多象錢寧這樣既有力量且面貌英俊的男子確實不多楚玉看他搏虎甚是為他擔心當猛虎撲上去尾巴隨後一剪他便揪著心為他捏一把冷汗他很自如厚厚的嘴唇緊緊地抿著大而長的眼睛嘲笑般地看著他面前的猛虎他使它憤怒一再呼嘯飛撲過來他一次又一次輕輕旋身躲過直到猛虎纍得口吐白沫眼中的凶光收斂他才尋機會騎到它背上狠擂數拳把它打昏在地看他搏虎很刺激也是一種享受每當他爬上觀台身上汗浸浸地閃著油亮他情不自禁地向他看去想像他在床第之間會是怎樣錢寧受到武宗寵幸賜國姓收為義子緊隨武宗左右與楚玉日日相見錢寧見楚玉模樣俊秀盈盈有情怎能不動心只是二人日夜守護在皇上身邊不敢放肆一日武宗在豹房排宴喝得酩酊大醉楚玉和錢守把他扶回樂室按排睡下兩人站起身來只見對面鏡中一男一女雙雙而立兩人對視良久楚玉故做嬌羞低下頭來錢寧上前一步拉起他的手猛地把他抱入懷中急煞煞地便欲行事楚玉嬌喘數聲又把他推開附耳道隨我來錢寧尾隨楚玉又去一室只見室內四壁挂滿春宮圖男歡女愛百態紛呈錢寧入豹房以後日日眼見男女尋歡的場面心中之火早已被撩撥的甚旺又見這滿室春宮更是渾身燥熱一刻也挨不住了如猛虎一般撲上前去一個是慣征能戰的梟雄一個是貪淫爭歡的怨婦説不出送迎醜態描不盡顛倒模樣爭奈心急難熬少不得雲收雨散如飛仙峽一般錢寧本是個舞刀弄棍賣野藥的所賣藥物也不全是假不少采自深山在山中生活難免遇上狼蟲虎豹練就了降虎伏豹的手段他年近三十尚未婚娶走州過府見識頗廣他的這種春藥自己輕易不用他知道此藥的厲害只有遇上那女中奇人才用上一二次今日碰上了楚玉不得已才使用了此藥楚玉與錢寧如此這般卻被一人看了一場好戲此人正是慧能慧能見皇上喝醉楚玉與錢寧雙雙把皇上扶走他便尾隨而至所有的舉動都被他看得一清二楚他看到錢寧掏藥用藥的手段心中便想把那藥物偷過來自用待這二人睡去撬門進來摸索著把藥揣入懷中帶上門又偷偷回房楚玉與錢寧相抱而眠睡了一個更次便醒來推那錢寧起身離去錢寧起身穿好衣服卻不見了藥包楚玉又發現門閂已被人打開心中吃驚不小二人急忙各回房間心不寧了幾日卻沒見武宗有何異常的舉動便又定下心來慧能在豹房偷雞摸狗不敢任意胡為只與彩兒打得火熱但僅此一個女人已滿足不了慧能的淫欲一日慧能在假山那邊巧逢楚玉便拿話威脅他想迫他繼續來往楚玉姑娘近日來更加美豔了卻不知是哪方的水澆過那和尚一雙賊眼粘在楚玉身上生生揭不下來楚玉聽他如此之説也不願和他囉嗦擡腿便走慧能攔住他見四下無人便貼上去説你不想它它卻想你禿驢楚玉柳眉倒豎喝道如此無理想是活膩了你我之間確有一人活膩了與那搏虎的小子私混慧能嘻皮笑臉地説楚玉聽他如此説便知那日起身後見門閂已開定是這僧人所為搏虎的小子如何他如今是皇上的義子你若血口噴人才是活膩了慧能心想錢寧眼下正受寵幸又被收為義子倘若此次叫開了二人死不認帳自己也沒好果子吃他原本也只是想嚇嚇這小蕩婦使他就範沒想到他如此厲害軟硬不吃心中正思索下文只見楚玉將膝蓋一彎撞向胯中説道收起你那活寶如果再來囉嗦姑奶奶就先把你給收拾了説完竟自走去慧能只覺得胯間一陳鑽心地刺痛蹲在地上半天直不起腰來他知道楚玉的武功厲害剛才這一下如果不是手下留情他就沒命他嘴裏罵著小淫婦小蕩婦心中對楚玉也自怯了三分不敢再找他的麻煩張旺連續多日不見皇上召喚心中也是彆扭卻見慧能臉色煞白走了過來二人施禮畢張旺説國師臉色不好可是有病在身慧能是被楚玉頂了一下沒恢復過來見張旺如此相問急忙掩飾道近日正在悟習一門功夫用氣不慎一時走叉了氣過幾日便會恢復國師練的什麼功夫儘是些佛家的內裏功夫卻也算不得什麼張公公近日如何這般間散慧能這一問正中張旺的心病近些時日皇上已逐漸疏遠於他不再重用想必是對劉瑾和他已産生疑心他正不知如何是好見慧能如此問道便歎了一口氣説皇上如今有了義子用不上小人了説到錢寧慧能氣不打一處來如果不是這小子橫插一腳那小淫婦也不會對他如此無禮眼下見張旺對錢寧似乎也不滿就説道那小子不就是會鬥鬥虎射射箭與張公公哪能相提並論話不能這麼説我張旺又有什麼長處只不過是個打雜的罷了而人家卻是義子張公公話説白了吧我雖身為國師卻是你張公公引薦的有什麼用得著我的地方儘管言聲我就不信那小子能長期取悅皇上張旺心想皇上確實是個沒長性的錢寧要長期取樂皇上也實在不易等武宗看夠了搏虎鬥豹錢寧也就沒有用處了可眼下我所面臨的事情卻比單單失寵嚴重的多打殺攻伐均非己之所長只有重新取悅皇上一條路可是用何法取悅皇上呢他眉頭緊促愁苦滿面慧能見張旺如此模樣也無話可説告辭道寺中新設求子一課下午尚要講經説道我先回去了求子張旺眼前一亮急忙問道國師還會做求子的佛事那個自然慧能默默笑道和尚對此道最精皇上妃妾成千上萬至今尚未産下一瓜半棗國師為何不為皇上專設道場這個慧能言語猶豫他心中知道那求子的事情完全是騙人的把戲不能當真平民百姓有那不生育的是男人無種把那女子弄暈稍代他勞作生兒育女也還有望只是那女人不育的總也無法代勞這種事如被戳穿了就如通姦一般有何神祕可是張旺此時只求取悅皇上之法他見慧能猶豫不決急急地求道此事若成皇上必然大喜過望你我也都有了重新出人頭地的機會慧能心中尋思在宮中求子卻也是一場好事武宗對後宮防範不嚴弄得好那些美女盡可享用一時淫心大發便一口應承下來張旺見慧能答應了滿心歡喜便欲尋機會向武宗獻媚張永拿著馬肚帶自己打不定主意該如何行事便偷偷來到楊一清府上告知此事楊一清勸張永不要打草驚蛇不必大張旗鼓地去查可暗中派人打探抓住人證以防對方殺人滅口如抓到人證那劉瑾再能狡辨也無濟於事張公公可趁機再向皇上進言我在朝中也聯絡一些官員一起上書彈劾那姦賊裏應外合必然得手皇上眼下似有些心動只是劉瑾伺候皇上太久皇上必不忍心除他我上次所説劉健女兒一事不知公公可否聯絡沒有用我打探過了劉碧入宮幾年尚未得近皇上如何能説上話難道就不能想法讓皇上召劉碧一次這個卻也不難只不知那劉碧是否真如人們所説那般美麗這個假不了如此事情便好辦了楊一清留張永小酌幾杯二人這才分手次日張永入豹房皇上正在看錢寧帶著幾個小太監鬥鵪鶉張旺也站在一旁插科鬥渾連鬥幾場各有勝負錢寧從身邊的袋子裏又取出一隻鵪鶉在手將指甲彈著引了一會兒輕輕放入盤中那只連連得勝的奔過來連啄幾嘴那鵪鶉縮著頭扇著翅沿盤而走追逐者又奔上來啄卻見對方不動口勢便漸漸慢了目空一切地開始四下張望那鵪鶉趁它不防備時猛跳起來咬著它的項皮摔咬得血流鵪鶉護疼飛去武宗大聲叫好又叫錢守教小太監們如何鬥鵪鶉分作兩隊進行比賽張永見了鬥鵪鶉心中似有所悟與劉瑾鬥法不如佯做無所作為趁他不防備時再下手下手就要向其要害部位狠啄楊一清不讓他動用官吏查馬肚帶一事倒是個上乘的好招我不如再裝得若無其事一些心中想著便照著張旺的肩膀拍了一巴掌説道好興致好有趣你怎麼只看不戰張旺一看是張永急忙應承道這種鬥法只有錢大人最通小的只是捧捧場哪知道個中的妙處武宗見張永來了便召呼他坐到身邊一起觀看又看了幾場武宗道這些小玩藝鬥起來不如虎豹那般凶猛錢寧急忙説豹房的武士已經幾日不曾鬥虎了正欲向皇上顯顯身手武宗便從園中起身去豹房那邊自從錢寧進了豹房又在豹房附近專門修了一個露天鬥獸場場子呈圓形兩人多高的圍牆圍著有一條甬道直通場內和虎豹伺養處場子一邊搭著一個半圓形的臺子皇上看鬥獸時兩邊坐著樂工鼓手先是奏樂擂鼓然後將虎豹從籠中放出通過甬道進入場內鬥獸場的牆上挂著兩副軟梯供武士上下鬥獸或逃避野獸的攻擊武宗來到鬥獸場上鼓樂齊奏錢寧帶著那一百多人身穿將官的盔甲一字排好等待皇上點將另有一名伺獸太監捧著個簿子趨到皇上面前獻上皇上打開薄子上面儘是些虎豹的名字從大虎二虎排下去並注有老虎的産地特點等豹子也是這等排法武宗點了兩隻新進的虎讓虎與虎鬥一通鼓鼓聲停止伺虎人便把老虎從籠中放出來經過甬道跑入場中這些虎全是戍邊的將士抓獲獻來的只只野性未改咆哮跳躍鬥虎前如與武士相鬥就餓虎一天餓虎見了人便會猛撲下來凶狠非常若是虎與虎鬥便給它們吃個半飽在場中丟下肉食二虎搶食就會發生火拼今日這兩隻虎一隻身長約有七尺象一頭牛犢另一隻身長雖短些看起來卻是目露凶光齒寒爪利兩隻老虎進了場互相盯視著對方低吼似是陌生人互相察問伺養太監把一塊馬肉丟進場中兩隻老虎見了飛撲過去那只短些的老虎一口把肉叼住另一隻也撲過來也一口咬住這塊肉不鬆口兩虎你爭我奪誰不肯相讓肉被撕爛了一隻虎咽下一塊又敵視地望著對方又有一塊肉丟下來兩隻虎又奔上前去這一次沒等叼住那塊肉兩虎便撲打起來或許是它們已經清楚不打倒對方那塊肉就吃不進嘴裏兩隻虎你撲過來我撲過去利爪相搏虎尾如剪那身長的猛虎或許是上了年紀鬥來鬥去反而被那身短的占了上風一爪子拍在額上便跪倒不起了那勝利者就急忙跑過去把肉吞咽下去伺養太監又扔下一塊肉那只虎又叼進嘴裏另一隻虎趴在地上眼巴巴地看卻再也不肯起身相搏武宗又命換豹點了一名武士下場與其相鬥如果説搏虎難搏豹更難豹子身體靈活要避過它的攻擊很是不易那武土利用軟梯為退路贏了第一場第二場下場的武士看模樣只有十七八歲膚色漆黑手握木棒也挺神氣他也是與錢寧一起選進來的如今看錢寧如此得意心中不服自恃武藝不比錢寧差欲在皇上面前顯露幾手與他相鬥的那只豹子圓顱如鐵四蹄如風身子直立高度比他還要高這武士利用嫺熟的躲閃功夫贏得了看臺上一陳陳的叫好